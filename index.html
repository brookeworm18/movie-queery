<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="style.css">
  <title>Movie Queery</title>
</head>
<body>
  <div id="banner">

  </div>
  <h1>Movie Queery</h1>

<script>
const image1 = "./images/image1.jpeg"
const image2 = "./images/image2.jpeg"
const image3 = "./images/image3.jpeg"
const image4 = "./images/image4.jpeg"
var imageList = [image1, image2, image3, image4];
let currentImage = 0;
function changeImage(){
  currentImage = currentImage + 1; //changes image
  if (currentImage>3){currentImage=0}; //resets cycle
  document.getElementById("banner").style.backgroundImage = "url(" + imageList[currentImage] + ")"; //outputs new image
};
document.getElementById("banner").style.backgroundImage = "url(" + imageList[0] + ")"; //makes an image appear on loading
setInterval(changeImage, 15000) //timer
</script>
</body>
</html>
