<!DOCTYPE html>
<html>
<head>
    <title>OMDb API</title>
    <style>
        body {font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;}
        #footer {width:100%; text-align: center; border-radius:5px;clear:left; background:rgb(230, 231, 230);
    color:rgb(49,78,173); border-bottom:5px solid rgb(192, 227, 255);padding: 2px; margin: 0 auto; margin-top:50px;}

    </style>
</head>



<body>
<h2>Enter a movie title!</h2>
  <input type="text" id="title">
    <button type="button" onclick="onClickMovie()">Tell Me More!</button>
    <br><br>


<script>
    async function onClickMovie(){
        var title = document.getElementById("title").value;
        var url = `http://www.omdbapi.com/?apikey=fa9055ab&t=${title}&plot=full`
        var response = await fetch(url);
        var data = await response.json();
        document.getElementById('year').innerText = data.Year;
        document.getElementById('plot').innerText = data.Plot;
    
    }
</script>
<div id="year" type="text"></div>
<br>
<div id="plot" type="text"></div>
        
<br>
<br>
<div id="footer">
  <p>API by Brian Fritz.</p>
  <p>All content licensed under CC BY-NC 4.0.</p>
</div>


</body>

</html>
