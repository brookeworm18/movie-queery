<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="style.css">
    <title>OMDb API</title>
</head>

<body>

<div id="banner"></div>
  <h1>MoVIe QUeeRy</h1>
  <div><img id="navbar" src="./images/sidebar.png"></img></div>

<div id="page-content">
    <h2>Enter a movie title!</h2>
      <input id="input" type="text" id="title">
        <button id="button" type="button" onclick="onClickMovie()">Tell Me More!</button>
        <br><br>
</div>

<script>
const image1 = "./images/image1.jpeg"
const image2 = "./images/image2.jpeg"
const image3 = "./images/image3.jpeg"
const image4 = "./images/image4.jpeg"
var imageList = [image1, image2, image3, image4];
let currentImage = 0;
document.getElementById("banner").style.backgroundImage = "url(" + imageList[0] + ")"; //makes an image appear on loading
function changeImage(){
  currentImage = currentImage + 1; //changes image
  if (currentImage>3){currentImage=0}; //resets cycle
  document.getElementById("banner").style.backgroundImage = "url(" + imageList[currentImage] + ")"; //outputs new image
};
setInterval(changeImage, 15000) //timer
    
    async function onClickMovie(){
        var title = document.getElementById("title").value;
        var url = `https://www.omdbapi.com/?apikey=fa9055ab&t=${title}&plot=full`
        var response = await fetch(url);
        var data = await response.json();
        document.getElementById('year').innerText = data.Year;
        document.getElementById('plot').innerText = data.Plot;
    
    }
</script>
<div id="year" type="text"></div>
<br>
<div id="plot" type="text"></div>
        
<br>
<br>
<div id="footer">
  <p>API by Brian Fritz.</p>

</div>


</body>

</html>
